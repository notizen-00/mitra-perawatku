<!-- Micro-interactions Script -->
<script>
        let timeLeft = 15;
        const countdownNumber = document.getElementById('countdown-number');
        const timerProgress = document.getElementById('timer-progress');
        const totalLength = 2 * Math.PI * 45; // Circumference of the circle r=45

        const timerInterval = setInterval(() => {
            timeLeft--;
            countdownNumber.textContent = timeLeft;

            // Calculate stroke dashoffset for progress
            const offset = totalLength - (timeLeft / 15) * totalLength;
            timerProgress.style.strokeDashoffset = offset;

            if (timeLeft <= 5) {
                countdownNumber.classList.add('text-error', 'animate-pulse');
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                // Handle timeout (e.g., auto-decline or redirect)
                alert("Permintaan kadaluarsa.");
            }
        }, 1000);

        // Simple haptic feedback simulation
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('touchstart', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(15);
                }
            });
        });
    </script>
